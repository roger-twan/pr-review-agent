substitutions:
  _REGION: us-central1
  _SERVICE: pr-review-agent

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/pr-review/${_SERVICE}:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/pr-review/${_SERVICE}:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/pr-review/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --set-secrets
      - GITHUB_APP_ID=github-app-id:latest,GITHUB_WEBHOOK_SECRET=github-webhook-secret:latest,GITHUB_PRIVATE_KEY=github-private-key:latest,DEEPSEEK_API_KEY=deepseek-api-key:latest
      - --set-env-vars
      - LLM_PROVIDER=deepseek,LLM_MODEL=deepseek-v4-flash,DEEPSEEK_BASE_URL=https://api.deepseek.com

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/pr-review/${_SERVICE}:$COMMIT_SHA
